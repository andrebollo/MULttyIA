<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MULtty - Terminal Serial Compartilhado com IA</title>
    
    <!-- Biblioteca MQTT.js para melhor compatibilidade -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.10.1/mqtt.min.js"></script>
    
    <script>
        console.log("Script carregado - mqtt disponível:", typeof mqtt);
        
        // Função principal que espera o DOM estar pronto
        window.addEventListener('DOMContentLoaded', function() {
            console.log("DOM pronto");
            
            // --- VARIAVEIS GLOBAIS ---
            let mqttClient = null;
            let isConnectedToMQTT = false;
            
            let currentUser = "";
            let currentRoom = "";
            let myId = "user_" + Math.random().toString(16).substr(2, 8);
            
            // Serial & AI State
            let serialPort = null;
            let serialWriter = null;
            let serialReader = null;
            let isSerialConnected = false;
            let serialLockedBy = null;

            // Buffer e Timers
            let serialOutBuffer = ""; 
            let flushTimer = null;
            const MAX_PACKET_SIZE = 4096;
            const FLUSH_INTERVAL = 200;
            
            let users = {};
            
            // Elementos do DOM
            const elUsername = document.getElementById('username');
            const elRoomname = document.getElementById('roomname');
            const elWelcomeScreen = document.getElementById('welcome-screen');
            const elMainInterface = document.getElementById('main-interface');
            const elMainHeader = document.getElementById('main-header');
            const elBtnConnectSerial = document.getElementById('btn-connect-serial');
            const elChatMessages = document.getElementById('chat-messages');
            const elChatInput = document.getElementById('chat-msg-input');
            const elBtnSendChat = document.getElementById('btn-send-chat');
            const elTerminalOutput = document.getElementById('terminal-output');
            const elTerminalInputHidden = document.getElementById('terminal-input-hidden');
            const elUsersList = document.getElementById('users-list');
            const elSerialLog = document.getElementById('serial-log');
            const elPasteModal = document.getElementById('paste-modal');
            const elPasteTextArea = document.getElementById('paste-text-area');

            // --- LÓGICA DE LOGIN ---
        function enterRoom() {
            const name = elUsername.value.trim();
            const room = elRoomname.value.trim();

            if (!name || !room) {
                alert("Por favor, insira Nome e Sala.");
                return;
            }

            currentUser = name;
            currentRoom = room;

            elWelcomeScreen.style.display = 'none';
            elMainHeader.style.display = 'flex';
            elMainInterface.style.display = 'flex';
            
            document.getElementById('user-info').textContent = `${currentUser} | Sala: ${currentRoom}`;
            
            elChatInput.disabled = false;
            elBtnSendChat.disabled = false;

            initMQTT();
        }

        function initMQTT() {
            console.log("initMQTT chamado");
            console.log("mqtt disponível?", typeof mqtt);
            
            // Verificar se mqtt.js carregou
            if (typeof mqtt === 'undefined') {
                const erroMsg = "Erro: Biblioteca MQTT não carregou. Tente usar Chrome ou Firefox.";
                console.error(erroMsg);
                alert(erroMsg);
                return;
            }
            
            try {
                // Conectar usando MQTT.js
                const clientId = "multry_" + Math.random().toString(16).substr(2, 8);
                const brokerUrl = `wss://${MQTT_HOST}:${MQTT_PORT}${MQTT_PATH}`;
                console.log("Conectando a:", brokerUrl);
                
                mqttClient = mqtt.connect(brokerUrl, {
                    clientId: clientId,
                    keepalive: 30,
                    clean: true
                });
                
                mqttClient.on('connect', () => {
                    console.log("MQTT Conectado!");
                    isConnectedToMQTT = true;
                    onConnect();
                });
                
                mqttClient.on('error', (err) => {
                    console.error("MQTT Erro:", err);
                    addSystemMessage("Erro MQTT: " + err.message, 'error');
                });
                
                mqttClient.on('message', (topic, message) => {
                    const msg = {
                        destinationName: topic,
                        payloadString: message.toString()
                    };
                    onMessageArrived(msg);
                });
                
                mqttClient.on('offline', () => {
                    console.log("MQTT Offline");
                    isConnectedToMQTT = false;
                });
                
            } catch (e) {
                console.error("Erro ao conectar MQTT:", e);
                alert("Erro ao conectar: " + e.message);
            }
        }
        
        // Função para publicar mensagem no MQTT.js
        function publishMessage(topic, payload) {
            if (!mqttClient || !mqttClient.connected) {
                console.log("MQTT não conectado, ignorando mensagem");
                return;
            }
            try {
                mqttClient.publish(topic, payload);
            } catch (e) {
                console.error("Erro ao publicar:", e);
            }
        }

        function onFailure(err) {
            console.error("Connection failed: ", err);
            addSystemMessage(`Falha na conexão: ${err.message || "Erro desconhecido"}`, 'error');
            if (elBtnConnectSerial) elBtnConnectSerial.disabled = false; 
            setTimeout(() => {
                if (document.getElementById('main-interface') && document.getElementById('main-interface').style.display !== 'none') {
                    addSystemMessage("Tentando reconectar...", 'system');
                    initMQTT();
                }
            }, 5000);
        }

        function onConnect() {
            isConnectedToMQTT = true;
            addSystemMessage("Conectado ao chat com sucesso!", 'system');

            const topicBase = `multry/${currentRoom}`;
            
            mqttClient.subscribe(`${topicBase}/chat`);
            mqttClient.subscribe(`${topicBase}/presence`);
            mqttClient.subscribe(`${topicBase}/serial/data`);
            mqttClient.subscribe(`${topicBase}/serial/input`);
            mqttClient.subscribe(`${topicBase}/serial/lock`);
            mqttClient.subscribe(`${topicBase}/serial/output`);

            // Setup listener para mensagens de IA
            setupAIListener();

            publishMessage(`${topicBase}/presence`, JSON.stringify({
                type: 'join',
                id: myId,
                name: currentUser,
                hasSerial: false
            }));

            // Renderiza lista de usuários (inclui AndreIA)
            renderUsers();

            // AndreIA se apresenta
            setTimeout(() => {
                const apresentacao = `Olá! Eu sou a AndreIA, sua assistente de rede. 😊\n\nPara me chamar, basta digitar no chat:\n<b>AndreIA</b> + sua pergunta\n\nExemplo: "AndreIA qual é o status do equipamento?"\n\nPosso analisar os logs do terminal e ajudar a diagnosticar problemas.`;
                const payload = JSON.stringify({ sender: "AndreIA", text: apresentacao });
                publishMessage(`${topicBase}/chat`, payload);
            }, 1000);

            if (!serialLockedBy) {
                elBtnConnectSerial.disabled = false;
            }

            focusTerminalInput();
        }

        function onConnectionLost(err) {
            isConnectedToMQTT = false;
            console.log("Conexão perdida:", err);
            addSystemMessage("Desconectado do servidor.", 'system');
            
            setTimeout(() => {
                if (document.getElementById('main-interface') && document.getElementById('main-interface').style.display !== 'none') {
                    addSystemMessage("Tentando reconectar...", 'system');
                    initMQTT();
                }
            }, 5000);
        }

        function onMessageArrived(message) {
            const topic = message.destinationName;
            const payload = message.payloadString;
            const topicBase = `multry/${currentRoom}`;

            try {
                if (topic === `${topicBase}/chat`) {
                    const data = JSON.parse(payload);
                    addChatMessage(data.sender, data.text);
                }
                else if (topic === `${topicBase}/presence`) {
                    const data = JSON.parse(payload);
                    handlePresence(data);
                }
                else if (topic === `${topicBase}/serial/data`) {
                    // Se eu sou conectado, mando visualização local e envio para MQTT. Se for remoto, visualiza RX.
                    if (isSerialConnected) {
                        logSerialData(payload, 'rx'); 
                        // O backend cuida de enviar o RX para os outros.
                        const topic = `${topicBase}/serial/data`;
                        publishMessage(topic, payload);
                    } else {
                        processIncomingText(payload);
                        logSerialData(payload, 'rx');
                    }
                }
                else if (topic === `${topicBase}/serial/input`) {
                    if (isSerialConnected && serialWriter) {
                        serialWriter.write(payload);
                        logSerialData(payload, 'tx');
                    }
                }
                else if (topic === `${topicBase}/serial/lock`) {
                    const data = JSON.parse(payload);
                    updateSerialLock(data);
                }
                else if (topic === `${topicBase}/ai/query`) {
                    const data = JSON.parse(payload);
                    handleAIQuery(data);
                }
            } catch (e) {
                console.error("Erro parse JSON", e);
            }
        }

        async function sendChat() {
            const text = elChatInput.value.trim();
            if (!text) return;

            const topicBase = `multry/${currentRoom}`;
            const payload = JSON.stringify({ sender: currentUser, text: text });
            publishMessage(`${topicBase}/chat`, payload);
            elChatInput.value = '';

            // Verificar se é mensagem para AndreIA
            if (text.toLowerCase().startsWith('andreia')) {
                const question = text.replace(/^andreia\s*/i, '').trim();
                if (question) {
                    // Publicar mensagem especial para todos os clientes chamarem a IA
                    const aiPayload = JSON.stringify({ 
                        sender: currentUser, 
                        question: question,
                        logs: document.getElementById('terminal-output').textContent || "Sem logs"
                    });
                    publishMessage(`${topicBase}/ai/query`, aiPayload);
                    
                    // Mostrar que AndreIA está pensando para todos
                    addSystemMessage(`🤖 ${currentUser} perguntou à AndreIA: "${question}"`, 'system');
                }
            }
        }

        // Listener para mensagens de IA vindas de outros usuários
        function setupAIListener() {
            const topicBase = `multry/${currentRoom}`;
            mqttClient.subscribe(`${topicBase}/ai/query`);
        }

        async function handleAIQuery(data) {
            console.log("handleAIQuery recebido:", data);
            const { sender, question, logs } = data;
            
            // Adicionar um delay aleatório para evitar múltiplas respostas
            // Apenas um cliente (o primeiro que responder) enviará a resposta
            const delay = Math.random() * 500;
            
            await new Promise(r => setTimeout(r, delay));
            
            try {
                const logsText = logs || "Sem logs disponíveis";
                
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        room: currentRoom,
                        username: sender,
                        logs: logsText.slice(-4000),
                        question: question
                    })
                });

                const result = await response.json();
                console.log("Resposta da API:", result);
                
                if (!result.error) {
                    const topicBase = `multry/${currentRoom}`;
                    const payload = JSON.stringify({ sender: "AndreIA", text: result.response });
                    publishMessage(`${topicBase}/chat`, payload);
                } else {
                    console.error("Erro da API:", result.error);
                    // Envia erro apenas para quem perguntou
                    const topicBase = `multry/${currentRoom}`;
                    const payload = JSON.stringify({ sender: "AndreIA", text: "Desculpe, tive um problema: " + result.error });
                    publishMessage(`${topicBase}/chat`, payload);
                }
            } catch (err) {
                console.error("Erro ao processar query de IA:", err);
            }
        }

        async function askAndreIA(question) {
            addSystemMessage("🤖 AndreIA digitando...", 'system');
            elChatInput.disabled = true;

            console.log("Enviando para API:", { room: currentRoom, username: currentUser, question: question });

            try {
                const terminalLogs = document.getElementById('terminal-output').textContent || "Sem logs disponíveis";
                
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        room: currentRoom,
                        username: currentUser,
                        logs: terminalLogs.slice(-4000),
                        question: question
                    })
                });

                const data = await response.json();
                console.log("Resposta da API:", data);
                
                if (data.error) {
                    addSystemMessage("AndreIA: Desculpe, tive um problema: " + data.error, 'error');
                } else {
                    const topicBase = `multry/${currentRoom}`;
                    const payload = JSON.stringify({ sender: "AndreIA", text: data.response });
                    publishMessage(`${topicBase}/chat`, payload);
                }
            } catch (err) {
                addSystemMessage("AndreIA: Erro ao conectar - " + err.message, 'error');
            }

            elChatInput.disabled = false;
        }

        if (elChatInput) {
            elChatInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') sendChat();
            });
        }

        function addChatMessage(sender, text) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="sender">${sender}:</span> ${escapeHtml(text)}`;
            elChatMessages.appendChild(div);
            elChatMessages.scrollTop = elChatMessages.scrollHeight;
        }

        function addSystemMessage(text, type = 'system') {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.textContent = text;
            elChatMessages.appendChild(div);
            elChatMessages.scrollTop = elChatMessages.scrollHeight;
        }

        function handlePresence(data) {
            if (data.id === myId) return;

            if (data.type === 'join') {
                if (!users[data.id]) {
                    users[data.id] = { name: data.name, hasSerial: data.hasSerial };
                    addSystemMessage(`${data.name} entrou na sala.`);
                    
                    // Novo usuário entrou - apresentar a AndreIA
                    setTimeout(() => {
                        const topicBase = `multry/${currentRoom}`;
                        const apresentacao = `Olá ${data.name}! Eu sou a AndreIA, sua assistente de rede. 😊\n\nPara me chamar, basta digitar no chat:\n<b>AndreIA</b> + sua pergunta\n\nExemplo: "AndreIA qual é o status do equipamento?"`;
                        const payload = JSON.stringify({ sender: "AndreIA", text: apresentacao });
                        publishMessage(`${topicBase}/chat`, payload);
                    }, 500);
                    
                    const topicBase = `multry/${currentRoom}`;
                    publishMessage(`${topicBase}/presence`, JSON.stringify({
                        type: 'announce',
                        id: myId,
                        name: currentUser,
                        hasSerial: isSerialConnected
                    }));
                }
            } else if (data.type === 'announce') {
                users[data.id] = { name: data.name, hasSerial: data.hasSerial };
                if (data.hasSerial) updateSerialLock({ action: 'lock', id: data.id, name: data.name });
            }
            renderUsers();
        }

        function renderUsers() {
            elUsersList.innerHTML = '';
            
            const meDiv = document.createElement('div');
            meDiv.className = 'user-item me';
            meDiv.innerHTML = `
                ${currentUser} (Eu)
                <span class="serial-indicator">Serial Conectada</span>
            `;
            if (isSerialConnected) meDiv.classList.add('has-serial');
            elUsersList.appendChild(meDiv);

            // Adicionar AndreIA como usuário virtual
            const andreiaDiv = document.createElement('div');
            andreiaDiv.className = 'user-item';
            andreiaDiv.style.color = '#9c27b0';
            andreiaDiv.innerHTML = `
                🤖 AndreIA
                <span class="serial-indicator" style="background:#9c27b0;color:#fff;">IA</span>
            `;
            elUsersList.appendChild(andreiaDiv);

            for (let id in users) {
                const u = users[id];
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `
                    ${u.name}
                    <span class="serial-indicator">Serial Conectada</span>
                `;
                if (u.hasSerial) div.classList.add('has-serial');
                elUsersList.appendChild(div);
            }
        }

        // --- SERIAL & TERMINAL LOGIC ---
        async function connectSerial() {
            if (!("serial" in navigator)) {
                alert("Web Serial API não suportada. Use Chrome/Edge/Opera.");
                return;
            }

            // Check de bloqueio (Sem backend, apenas 1 usuário por vez)
            if (serialLockedBy && serialLockedBy !== myId) {
                const ownerName = users[serialLockedBy]?.name || "um usuário";
                alert(`Serial em uso por ${ownerName}.`);
                return;
            }

            try {
                serialPort = await navigator.serial.requestPort();
                await serialPort.open({ baudRate: 9600 });

                const textEncoder = new TextEncoderStream();
                textEncoder.readable.pipeTo(serialPort.writable).catch(err => console.error("Erro pipe Writable", err));
                serialWriter = textEncoder.writable.getWriter();

                const textDecoder = new TextDecoderStream();
                serialPort.readable.pipeTo(textDecoder.writable).catch(err => console.error("Erro pipe Readable", err));
                const reader = textDecoder.readable.getReader();
                serialReader = reader;

                isSerialConnected = true;
                serialOutBuffer = "";
                if (flushTimer) clearTimeout(flushTimer);
                flushTimer = null;

                elBtnConnectSerial.textContent = "Serial Conectada";
                elBtnConnectSerial.disabled = true;
                elTerminalOutput.textContent = ""; 
                addSystemMessage("Conexão Serial local estabelecida.", 'system');
                logSerialData("--- Serial Conectada ---", 'rx');

                const topicBase = `multry/${currentRoom}`;
                if (isConnectedToMQTT) {
                    // Envia Lock
                    publishMessage(`${topicBase}/serial/lock`, JSON.stringify({ action: 'lock', id: myId, name: currentUser }));
                    publishMessage(`${topicBase}/presence`, JSON.stringify({ type: 'update_serial', id: myId, hasSerial: true }));
                }

                readSerialLoop();
                window.addEventListener("beforeunload", unlockSerial);
            } catch (err) {
                console.error(err);
                addSystemMessage("Erro Serial: " + err.message, 'error');
            }
        }

        async function readSerialLoop() {
            try {
                while (serialPort.readable && isSerialConnected) {
                    const { value, done } = await serialReader.read();
                    
                    if (done) { break; }
                    
                    if (value) {
                        // 1. Visual Local (Imediato)
                        processIncomingText(value);
                        
                        // 2. Buffering de Envio para IA
                        serialOutBuffer += value;
                        
                        if (flushTimer) clearTimeout(flushTimer);
                        
                        // Envio se buffer cheio ou lotado de 2KB
                        if (serialOutBuffer.length >= 4096) {
                            flushSerialBuffer(true);
                        } else {
                            flushTimer = setTimeout(() => {
                                flushSerialBuffer(true);
                            }, FLUSH_INTERVAL); // 2 segundos para aguardar um pouco de tráfego
                            elBtnConnectSerial.disabled = false; 
                        }
                    }
                }
            } catch (error) {
                console.error("Erro loop leitura:", error);
                addSystemMessage("Erro na leitura da serial. Verifique o dispositivo.", 'error');
            }
        }

        function unlockSerial() {
            // Envia o que sobrou no buffer antes de desconectar
            flushSerialBuffer(true);

            if (!isSerialConnected) return;
            if (serialWriter) serialWriter.close();
            if (serialReader) serialReader.cancel();
            if (serialPort) serialPort.close();
            isSerialConnected = false;
            serialPort = null;

            elBtnConnectSerial.textContent = "Conectar Serial";
            elBtnConnectSerial.disabled = false;

            if (isConnectedToMQTT) {
                const topicBase = `multry/${currentRoom}`;
                publishMessage(`${topicBase}/serial/lock`, JSON.stringify({ action: 'unlock' }));
                publishMessage(`${topicBase}/presence`, JSON.stringify({ type: 'update_serial', id: myId, hasSerial: false }));
            }
        }

        function updateSerialLock(data) {
            if (data.action === 'lock') {
                serialLockedBy = data.id;
                if (data.id !== myId) {
                    elBtnConnectSerial.disabled = true;
                    elBtnConnectSerial.textContent = `Serial em uso por ${data.name}`;
                }
            } else if (data.action === 'unlock') {
                if (serialLockedBy === data.id) {
                    serialLockedBy = null;
                    if (!isSerialConnected) {
                        elBtnConnectSerial.disabled = false;
                        elBtnConnectSerial.textContent = "Conectar Serial";
                    }
                }
            }
            if (users[data.id]) {
                users[data.id].hasSerial = (data.action === 'lock');
                renderUsers();
            }
        }

        // --- VISUALIZAÇÃO E PROCESSAMENTO DE TEXTO (RX) ---
        function processIncomingText(text) {
            for (let i =0; i < text.length; i++) {
                const char = text.charAt(i);
                const code = text.charCodeAt(i);

                // Filtro de caracteres de controle:
                // TAB(9), LF(10), CR(13), BS(8), DEL(127) ou imprimíveis (>31)
                if (code === 9 || code === 10 || code === 13 || code === 8 || code === 127) {
                    if (code === 8 || code === 127) {
                        executeBackspaceOnDOM();
                    } else {
                        const span = document.createElement('span');
                        span.textContent = char;
                        elTerminalOutput.appendChild(span);
                    }
                } else if (code >= 32) {
                    const span = document.createElement('span');
                    span.textContent = char;
                    elTerminalOutput.appendChild(span);
                }
            }
            elTerminalOutput.scrollTop = elTerminalOutput.scrollHeight;
        }

        function executeBackspaceOnDOM() {
            const lastChild = elTerminalOutput.lastElementChild;
            if (lastChild && lastChild.tagName === 'SPAN') {
                const txt = lastChild.textContent;
                if (txt.length > 0) {
                    lastChild.textContent = txt.slice(0, -1);
                    if (lastChild.textContent.length === 0) {
                        elTerminalOutput.removeChild(lastChild);
                    }
                } else {
                    elTerminalOutput.removeChild(lastChild);
                }
            }
            elTerminalOutput.scrollTop = elTerminalOutput.scrollHeight;
        }

        function focusTerminalInput() {
            elTerminalInputHidden.focus();
        }

        // --- TRATAMENTO DE TECLADO (TX) ---
        elTerminalInputHidden.addEventListener('input', (e) => {
            // Bloqueia qualquer evento de deleção automático do browser (Tab/Backspace em campo invisível)
            if (e.inputType === "deleteContentBackward" || e.inputType === "deleteContentForward") {
                // Não faz nada, pois já tratado no keydown
                e.target.value = '';
                return;
            }

            // Se for insertText, envia para serial
            if (e.inputType === "insertText") {
                const text = e.data || e.target.value;
                if (text) {
                    if (isConnectedToMQTT) {
                        const topicBase = `multry/${currentRoom}`;
                        publishMessage(`${topicBase}/serial/input`, text);
                    }
                    // Limpa campo
                    e.target.value = '';
                }
            }
        });

        // Evento KeyDown (Enter, Backspace, Tab, Setas)
        elTerminalInputHidden.addEventListener('keydown', (e) => {
            const topicBase = `multry/${currentRoom}`;

            if (e.key === 'Backspace') {
                e.preventDefault(); 
                // Visual
                executeBackspaceOnDOM();
                // Envia Backspace
                if (isConnectedToMQTT) {
                    publishMessage(`${topicBase}/serial/input`, '\x08'); 
                }
                e.target.value = ''; 
            } else if (e.key === 'Tab') {
                e.preventDefault();
                if (isConnectedToMQTT) {
                    publishMessage(`${topicBase}/serial/input`, '\t');
                }
                e.target.value = '';
            } else if (e.key === 'Enter') {
                if (isConnectedToMQTT) {
                    publishMessage(`${topicBase}/serial/input`, '\r');
                }
                e.target.value = '';
            }
        });

        // Setas e Outras Teclas
        function sendSpecialChar(char) {
            if (isConnectedToMQTT) {
                const topicBase = `multry/${currentRoom}`;
                publishMessage(`${topicBase}/serial/input`, char);
            }
            focusTerminalInput();
        }

        function sendModifiedKey(modifier) {
            let inputId = (modifier === 'c') ? 'ctrl-char' : 'alt-char';
            let inputEl = document.getElementById(inputId);
            if (inputEl) {
                let char = inputEl.value.toLowerCase();
                if (char.length === 1) {
                    let code = char.charCodeAt(0);
                    let payload = '';
                    if (modifier === 'c' && code >= 97 && code <= 122) {
                        payload = String.fromCharCode(code - 96);
                    } else if (modifier === 'a') {
                        payload = '\x1b' + char;
                    }
                    if (payload && isConnectedToMQTT) {
                        const topicBase = `multry/${currentRoom}`;
                        publishMessage(`${topicBase}/serial/input`, payload);
                        inputEl.value = '';
                        focusTerminalInput();
                    }
                }
            }
        }

        // Função Colar (Modal)
        function pasteToSerial() {
            elPasteModal.style.display = 'flex';
            elPasteTextArea.value = '';
            elPasteTextArea.focus();
        }

        function closePasteModal() {
            elPasteModal.style.display = 'none';
            focusTerminalInput();
        }

        function sendPasteText() {
            const text = elPasteTextArea.value;
            if (text && text.trim() !== "") {
                if (isConnectedToMQTT) {
                    const topicBase = `multry/${currentRoom}`;
                    const topic = `${topicBase}/serial/input`;
                    const CHUNK_SIZE = 1024; 
                    
                    for (let i = 0; i < text.length; i += CHUNK_SIZE) {
                        const chunk = text.substring(i, i + CHUNK_SIZE);
                        publishMessage(topic, chunk);
                        logSerialData(chunk, 'tx');
                    }
                    
                    if (!isSerialConnected) {
                        // Visualiza o que foi colado apenas para quem colou
                        processIncomingText(text);
                    }
                }
            }
            closePasteModal();
        }

        // --- LOGS E DEBUG ---
        function logSerialData(data, direction) {
            const div = document.createElement('div');
            const timestamp = new Date().toLocaleTimeString();
            let cleanData = data.replace(/[\x00-\x1F\x7F]/g, (m) => {
                const special = {'\t':'TAB','\n':'LF','\r':'CR', '\x7F':'DEL', '\x08':'BS', '\x1b':'ESC'};
                return special[m] ? `{${special[m]}` : `{\\x${m.charCodeAt(0).toString(16)}}`;
            });
            div.className = (direction === 'tx') ? 'log-tx' : 'log-rx';
            div.textContent = `[${timestamp}] ${direction === 'tx' ? '>>' : '<<'} ${cleanData}`;
            elSerialLog.appendChild(div);
            elSerialLog.scrollTop = elSerialLog.scrollTop = elSerialLog.scrollHeight;
        }

        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        window.addEventListener('beforeunload', () => {
            if (isConnectedToMQTT) {
                const topicBase = `multry/${currentRoom}`;
                publishMessage(`${topicBase}/presence`, JSON.stringify({ type: 'leave', id: myId }));
                unlockSerial();
            }
        });
        
        }); // Fim do DOMContentLoaded
    </script>
</body>
</html>
